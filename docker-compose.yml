services:
  # ── MySQL (TaurusDB-compatible locally) ────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: gridguard_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: gridguard
      MYSQL_USER: gridguard_user
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - gridguard_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gridguard_user", "-ppassword123"]
      interval: 10s
      retries: 5

  # ── MQTT Broker (Mosquitto) ────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: gridguard_mqtt
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./Infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ── .NET Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: gridguard_api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__TaurusDB=Server=mysql;Port=3306;Database=gridguard;Uid=gridguard_user;Pwd=password123;SslMode=None;CharSet=utf8mb4;
      - Mqtt__Server=mosquitto
      - Mqtt__Port=1883
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started

  # ── Python AI Microservice ─────────────────────────────────────────────────
  microservice:
    build:
      context: ./Microservice
      dockerfile: Dockerfile
    container_name: gridguard_ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    depends_on:
      - backend

volumes:
  gridguard_mysql_data:
